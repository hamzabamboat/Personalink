<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 470" width="720" height="470" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" role="img" aria-label="The post-type quadrant. X-axis useful to personal, Y-axis low to high effort. Top-left teardown, top-right honest post-mortem, bottom-left contrarian take, bottom-right build-in-public. Start in the low-effort row, then earn the right to the top row.">
  <rect x="1" y="1" width="718" height="468" rx="14" fill="#ffffff" stroke="#e4e7ef" stroke-width="1.5"/>
  <text x="28" y="40" font-size="15" font-weight="600" fill="#0a1024">The post-type quadrant</text>

  <!-- Low-effort row highlight -->
  <rect x="150" y="238" width="460" height="160" rx="2" fill="#f1f4ff"/>

  <!-- Plot border + grid -->
  <rect x="150" y="78" width="460" height="320" rx="4" fill="none" stroke="#d6dbe7" stroke-width="1.5"/>
  <line x1="380" y1="78" x2="380" y2="398" stroke="#2b4dff" stroke-opacity="0.18" stroke-width="1.5"/>
  <line x1="150" y1="238" x2="610" y2="238" stroke="#2b4dff" stroke-opacity="0.18" stroke-width="1.5"/>

  <!-- Quadrant labels -->
  <text x="265" y="150" font-size="15" font-weight="600" fill="#0a1024" text-anchor="middle">Teardown</text>
  <text x="265" y="172" font-size="11.5" fill="#5a6478" text-anchor="middle">explain exactly how it works</text>

  <text x="495" y="150" font-size="15" font-weight="600" fill="#0a1024" text-anchor="middle">Honest post-mortem</text>
  <text x="495" y="172" font-size="11.5" fill="#5a6478" text-anchor="middle">what went wrong, with numbers</text>

  <text x="265" y="310" font-size="15" font-weight="600" fill="#0a1024" text-anchor="middle">Contrarian take</text>
  <text x="265" y="332" font-size="11.5" fill="#5a6478" text-anchor="middle">a clear, defensible opinion</text>

  <text x="495" y="310" font-size="15" font-weight="600" fill="#0a1024" text-anchor="middle">Build-in-public</text>
  <text x="495" y="332" font-size="11.5" fill="#5a6478" text-anchor="middle">a real number from your week</text>

  <!-- Axis labels -->
  <text transform="translate(128 158) rotate(-90)" font-size="10.5" font-weight="600" letter-spacing="0.06em" fill="#8a92a6" text-anchor="middle">HIGH EFFORT</text>
  <text transform="translate(128 318) rotate(-90)" font-size="10.5" font-weight="600" letter-spacing="0.06em" fill="#8a92a6" text-anchor="middle">LOW EFFORT</text>
  <text x="265" y="420" font-size="10.5" font-weight="600" letter-spacing="0.06em" fill="#8a92a6" text-anchor="middle">USEFUL</text>
  <text x="495" y="420" font-size="10.5" font-weight="600" letter-spacing="0.06em" fill="#8a92a6" text-anchor="middle">PERSONAL</text>

  <!-- Caption -->
  <text x="360" y="450" font-size="13" font-style="italic" fill="#5a6478" text-anchor="middle">Start in the low-effort row. Earn the right to the top row.</text>
</svg>
